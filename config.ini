//TLD焕新版
//项目地址:https://github.com/meowluna/TLDReBorn



//头部相关↓

// 是否显示所查单词、音标、时态, 0 关闭 , 1 显示
header = 1;

//是否显示考试词汇标签、柯林斯星级, 0 关闭 , 1 显示
exam = 1;



//发音相关↓
//*发音图标默认隐藏,如需显示请在p.css中删除相关css,并确保图标图片及mdd文件存在
//*此处可控制英美发音图标是否显示,但因为js加载顺序,可能导致闪屏

//是否显示英音图标 0 关闭 , 1 显示
pronuk = 1;

// 是否显示美音图标 0 关闭 , 1 显示
pronus = 1; 

//发音图标排序    1 美音优先  , 0 英音优先
order = 1;

//是否开启PC端自动发音 0 关闭 , 1 开启
auto_pron = 0;

//是否开启手机端自动发音 0 关闭 , 1 开启
mobile_auto_pron = 0;



//词频卡片相关↓

//词频卡片默认行为, 0 折叠 , 1 展开, 2 完全隐藏
freq_expand = 0;

//是否显示COCA词频词典, 0 关闭 , 1 显示
coca = 0;

//是否显示iWeb词频词典, 0 关闭 , 1 显示
//*iWeb无悬浮详细词频表
iweb = 1;

//是否显示口语词频词典, 0 关闭 , 1 显示
spoken = 1;

//是否显示短语词频词典, 0 关闭 , 1 显示
EPFD = 1;



//词义词性相关↓

//是否显示词义分布胶囊, 0 关闭 , 1 显示
ex_ratio = 1;

//是否显示分词性词义, 0 关闭 , 1 显示
definition = 1;



//界面显示相关↓

//黑暗模式, 0 跟随系统/软件 , 1 强制浅色 , 2 强制深色
dark_mode = 0;