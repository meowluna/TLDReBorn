//TLD焕新版

//发音相关
//发音图标默认隐藏,如需显示请在p.css中删除相关css,并确保图标图片及mdd文件存在
//此处可控制英美发音图标是否显示,但因为js加载顺序,会导致闪屏
// 是否开启英音图标 0 关闭 , 1 开启
pronuk = 1;

// 是否开启美音图标 0 关闭 , 1 开启
pronus = 1; 

//发音排序    1 美音优先  , 0 英音优先
order = 1;

//是否开启PC端自动发音 0 关闭 , 1 开启
auto_pron = 0;

//是否开启手机端自动发音 0 关闭 , 1 开启
mobile_auto_pron = 0;



//是否开启COCA词频词典, 0 关闭 , 1 开启
coca = 0;

//是否开启iWeb词频词典, 0 关闭 , 1 开启
//iWeb无悬浮详细词频表
iweb = 1;

//是否开启口语词频词典, 0 关闭 , 1 开启
spoken = 1;

//是否开启考试词汇及柯林斯五星词频词典, 0 关闭 , 1 开启
exam = 1;

//是否开启单词释义比例词典, 0 关闭 , 1 开启
ex_ratio = 1;

//是否开启短语词频词典, 0 关闭 , 1 开启
EPFD = 1;

//是否开启简明释义 0 关闭 , 1 开启
definition = 1;

// 是否显示头部区域(包含所查单词,音标,时态) 0 关闭 , 1 开启
header = 1;
